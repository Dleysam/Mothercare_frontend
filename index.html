<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABBS Mothercare AI | Real-Time Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select, input { transition: all 0.2s ease-in-out; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-xl w-full glass-card rounded-[2rem] shadow-2xl p-6 md:p-10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="https://raw.githubusercontent.com/dleysam/mothercare_frontend/main/gabbs.png" alt="GABBS" class="h-10 object-contain">
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Mothercare Predictor</h1>
            <p id="sync-status" class="text-slate-500 text-[9px] uppercase tracking-widest font-bold mt-1">Live Weather: Warri, NG</p>
        </div>

        <form id="predictForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Category</label>
                    <select id="category" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none text-sm">
                        <option value="0">Back to School</option>
                        <option value="1">General/Other</option>
                        <option value="2">Mothercare</option>
                        <option value="3">Toys</option>
                        <option value="4">Wears/Shoes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-blue-400 mb-2 ml-1">Weather (Hourly Sync)</label>
                    <select id="weather" class="w-full bg-slate-900/50 border border-blue-500/30 rounded-xl p-3 outline-none text-sm pointer-events-none opacity-60">
                        <option value="0">Clear</option>
                        <option value="1">Clear/Sunny</option>
                        <option value="2">Cloudy</option>
                        <option value="3">Light Rain</option>
                        <option value="4">Normal/Cool</option>
                        <option value="5">Overcast</option>
                        <option value="8">Rainy</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <input type="number" id="day" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-sm">
                <input type="number" id="month" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-sm">
                <input type="number" id="start_hour" class="w-full bg-blue-900/20 border border-blue-500/50 rounded-xl p-3 text-center text-sm font-bold text-blue-400">
            </div>

            <div class="p-4 bg-slate-900/80 rounded-2xl border border-slate-800 grid grid-cols-3 gap-4 text-center">
                <div><span class="block text-[10px] text-slate-500 uppercase mb-1">Temp</span><p id="ui_temp" class="text-xl font-bold">--</p></div>
                <div class="border-x border-slate-800"><span class="block text-[10px] text-slate-500 uppercase mb-1">Humid</span><p id="ui_humid" class="text-xl font-bold">--</p></div>
                <div><span class="block text-[10px] text-slate-500 uppercase mb-1">Precip</span><p id="ui_precip" class="text-xl font-bold">--</p></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="day_final" class="hidden"><option value="1"></option></select>
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Is Payday Week?</label>
                    <select id="payday_bin" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm font-bold">
                        <option value="0">Regular Day (0)</option>
                        <option value="1">Payday Active (1)</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all uppercase tracking-widest text-xs">
                Run Prediction
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 p-6 bg-slate-900 border border-slate-800 rounded-[1.5rem] text-center">
            <p id="statusLabel" class="text-[10px] font-bold uppercase tracking-widest mb-1"></p>
            <h2 id="predictionValue" class="text-6xl font-black text-white">--</h2>
            <p id="suggestionText" class="text-slate-300 text-xs mt-4"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://dleysam-mothercare-predictor-api.hf.space/predict";
        const WEATHER_KEY = "Q4G4KAQFFW5RMB9VCTFKZGXP9";
        const CITY = "Warri,NG";

        let weatherMetrics = { temp: 28, humidity: 60, precip: 0 };

        async function fetchWeather() {
            const d = document.getElementById('day').value.padStart(2, '0');
            const m = document.getElementById('month').value.padStart(2, '0');
            const h = parseInt(document.getElementById('start_hour').value);
            const status = document.getElementById('sync-status');
            
            try {
                const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${CITY}/2026-${m}-${d}?unitGroup=metric&key=${WEATHER_KEY}&contentType=json`);
                const data = await res.json();
                const hour = data.days[0].hours[h];

                weatherMetrics = { temp: hour.temp, humidity: Math.round(hour.humidity), precip: hour.precip || 0 };
                document.getElementById('ui_temp').innerText = weatherMetrics.temp + "°";
                document.getElementById('ui_humid').innerText = weatherMetrics.humidity + "%";
                document.getElementById('ui_precip').innerText = weatherMetrics.precip + "mm";

                const dayMap = { 0: 3, 1: 1, 2: 5, 3: 6, 4: 4, 5: 0, 6: 2 };
                document.getElementById('day_final').value = dayMap[new Date(2026, m-1, d).getDay()];
                status.innerText = "✅ Forecast Synced";
            } catch (e) { status.innerText = "⚠️ Weather Sync Failed"; }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('day').value = now.getDate();
            document.getElementById('month').value = now.getMonth() + 1;
            document.getElementById('start_hour').value = now.getHours();
            fetchWeather();
        };

        document.getElementById('day').onchange = fetchWeather;
        document.getElementById('start_hour').onchange = fetchWeather;

        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Contacting AI...";

            const payload = {
                category: parseInt(document.getElementById('category').value),
                weather: parseInt(document.getElementById('weather').value),
                day_final: parseInt(document.getElementById('day_final').value),
                day: parseInt(document.getElementById('day').value),
                month: parseInt(document.getElementById('month').value),
                payday_bin: parseInt(document.getElementById('payday_bin').value),
                start_hour: parseInt(document.getElementById('start_hour').value),
                shelf_status: 3,
                temp: weatherMetrics.temp,
                humidity: weatherMetrics.humidity,
                precip: weatherMetrics.precip
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const data = await response.json();
                const p = Math.round(data.prediction);
                
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('predictionValue').innerText = p;
                document.getElementById('statusLabel').innerText = p > 3 ? "HIGH DEMAND" : "STABLE";
                document.getElementById('statusLabel').style.color = p > 3 ? "#ef4444" : "#10b981";
                document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                console.error("Prediction Error:", err);
                alert(`API Error: ${err.message}. Please ensure your Hugging Face Space is 'Running'.`);
            } finally {
                btn.disabled = false; btn.innerText = "Run Prediction";
            }
        };
    </script>
</body>
</html>
