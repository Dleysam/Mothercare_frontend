<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABBS Mothercare AI | Advanced Demand Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .toggle-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .toggle-active { background-color: #3b82f6 !important; color: white !important; border-color: #60a5fa !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-xl w-full glass-card rounded-[2.5rem] shadow-2xl p-6 md:p-10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="https://raw.githubusercontent.com/dleysam/mothercare_frontend/main/gabbs.png" alt="GABBS" class="h-10 object-contain">
            </div>
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent italic">Mothercare Predictor</h1>
            <p id="sync-status" class="text-blue-500 text-[10px] uppercase tracking-[0.2em] font-bold mt-2">📡 Weather Link Active</p>
        </div>

        <form id="predictForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Category</label>
                    <select id="category" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm font-bold appearance-none outline-none focus:border-blue-500">
                        <option value="Mothercare">Mothercare</option>
                        <option value="Toys">Toys</option>
                        <option value="Back to School">Back to School</option>
                        <option value="Wears/Shoes">Wears/Shoes</option>
                        <option value="General/Other">General/Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Weather Context</label>
                    <div id="weather_display" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-sm font-bold text-blue-400 capitalize">
                        Syncing...
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Shelf Status (Stock Level)</label>
                <div class="flex p-1 bg-slate-900 border border-slate-800 rounded-2xl gap-1">
                    <button type="button" onclick="setToggle('shelf_status', 1, this)" class="toggle-btn flex-1 py-3 text-[10px] font-black uppercase rounded-xl border border-transparent text-slate-500">Full</button>
                    <button type="button" onclick="setToggle('shelf_status', 3, this)" class="toggle-btn flex-1 py-3 text-[10px] font-black uppercase rounded-xl border border-transparent text-slate-500 toggle-active">Normal</button>
                    <button type="button" onclick="setToggle('shelf_status', 5, this)" class="toggle-btn flex-1 py-3 text-[10px] font-black uppercase rounded-xl border border-transparent text-slate-500">Empty</button>
                </div>
                <input type="hidden" id="shelf_status" value="3">
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Payday Period</label>
                    <div class="flex p-1 bg-slate-900 border border-slate-800 rounded-2xl gap-1">
                        <button type="button" onclick="setToggle('payday_bin', 0, this)" class="toggle-btn flex-1 py-3 text-[10px] font-black uppercase rounded-xl border border-transparent text-slate-500 toggle-active">Standard Day</button>
                        <button type="button" onclick="setToggle('payday_bin', 1, this)" class="toggle-btn flex-1 py-3 text-[10px] font-black uppercase rounded-xl border border-transparent text-slate-500">Payday Rush</button>
                    </div>
                    <input type="hidden" id="payday_bin" value="0">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-500 uppercase mb-2 ml-1 text-center">Hour</label>
                    <input type="number" id="start_hour" class="w-full bg-blue-900/20 border border-blue-500/50 rounded-2xl p-3 text-center font-bold text-blue-400 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-slate-900/50 rounded-2xl border border-slate-800 p-3 flex items-center justify-around">
                    <div class="text-center"><span class="text-[8px] text-slate-500 uppercase font-black">Temp</span><p id="t_val" class="text-sm font-black">--</p></div>
                    <div class="text-center"><span class="text-[8px] text-slate-500 uppercase font-black">Humid</span><p id="h_val" class="text-sm font-black">--</p></div>
                    <div class="text-center"><span class="text-[8px] text-slate-500 uppercase font-black">Precip</span><p id="p_val" class="text-sm font-black">--</p></div>
                </div>
                <div class="bg-slate-900/50 rounded-2xl border border-slate-800 p-2 text-center">
                    <span class="text-[8px] text-slate-500 uppercase font-black">Date</span>
                    <input type="number" id="day" class="w-full bg-transparent text-center text-sm font-bold outline-none" placeholder="DD">
                </div>
                <div class="bg-slate-900/50 rounded-2xl border border-slate-800 p-2 text-center">
                    <span class="text-[8px] text-slate-500 uppercase font-black">Month</span>
                    <input type="number" id="month" class="w-full bg-transparent text-center text-sm font-bold outline-none" placeholder="MM">
                </div>
            </div>

            <input type="hidden" id="day_final" value="1">

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[2rem] shadow-xl uppercase tracking-[0.2em] text-xs transition-all active:scale-95">
                Run Inference Engine
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 p-8 bg-slate-900 rounded-[2.5rem] border border-slate-800 text-center animate-in fade-in zoom-in duration-300">
            <p id="statusLabel" class="text-[10px] font-bold uppercase tracking-widest mb-2"></p>
            <h2 id="predictionValue" class="text-7xl font-black text-white">0</h2>
            <p id="suggestionText" class="text-slate-400 text-[11px] mt-4 uppercase font-bold px-4"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://dleysam-mothercare-predictor-api.hf.space/predict";
        const WEATHER_KEY = "Q4G4KAQFFW5RMB9VCTFKZGXP9";
        let metrics = { temp: 28, humidity: 65, precip: 0, conditions: "clear" };

        function setToggle(inputId, value, btn) {
            document.getElementById(inputId).value = value;
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('toggle-active'));
            btn.classList.add('toggle-active');
        }

        async function updateWeather() {
            const d = document.getElementById('day').value;
            const m = document.getElementById('month').value;
            const h = document.getElementById('start_hour').value;
            const statusEl = document.getElementById('weather_display');
            
            try {
                const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/Warri,NG/2026-${m}-${d}?unitGroup=metric&key=${WEATHER_KEY}&contentType=json`);
                const data = await res.json();
                const hrData = data.days[0].hours[h] || data.days[0];
                
                let cond = hrData.conditions.toLowerCase();
                if (cond.includes('rain')) cond = 'rainy';
                else if (cond.includes('cloud')) cond = 'cloudy';
                else if (cond.includes('overcast')) cond = 'overcast';
                else cond = 'clear';

                metrics = { temp: hrData.temp, humidity: hrData.humidity, precip: hrData.precip || 0, conditions: cond };

                document.getElementById('t_val').innerText = Math.round(metrics.temp) + "°";
                document.getElementById('h_val').innerText = Math.round(metrics.humidity) + "%";
                document.getElementById('p_val').innerText = metrics.precip + "m";
                statusEl.innerText = cond;
            } catch (e) { 
                statusEl.innerText = "Manual Mode";
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('day').value = now.getDate();
            document.getElementById('month').value = now.getMonth() + 1;
            document.getElementById('start_hour').value = now.getHours();
            updateWeather();
        };

        [document.getElementById('day'), document.getElementById('month'), document.getElementById('start_hour')].forEach(el => {
            el.addEventListener('change', updateWeather);
        });

        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Analysing Model...";

            const payload = {
                category: document.getElementById('category').value,
                weather: metrics.conditions,
                day_final: 1,
                day: parseInt(document.getElementById('day').value),
                month: parseInt(document.getElementById('month').value),
                payday_bin: parseInt(document.getElementById('payday_bin').value),
                start_hour: parseInt(document.getElementById('start_hour').value),
                shelf_status: parseInt(document.getElementById('shelf_status').value),
                temp: parseFloat(metrics.temp),
                humidity: parseInt(metrics.humidity),
                precip: parseFloat(metrics.precip)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const prediction = parseFloat(data.prediction);
                
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('predictionValue').innerText = prediction.toFixed(1);

                const sLab = document.getElementById('statusLabel');
                const sTex = document.getElementById('suggestionText');

                if (prediction <= 1.5) {
                    sLab.innerText = "Low Demand"; sLab.style.color = "#10b981";
                    sTex.innerText = "Good time for inventory and organizing.";
                } else if (prediction <= 3.5) {
                    sLab.innerText = "Moderate Demand"; sLab.style.color = "#f59e0b";
                    sTex.innerText = "Steady flow expected. Keep shelves tidy.";
                } else {
                    sLab.innerText = "High Demand / Rush!"; sLab.style.color = "#ef4444";
                    sTex.innerText = "Peak period! Speed up service and restocking.";
                }
            } catch (err) {
                alert("Check API connection.");
            } finally {
                btn.disabled = false; btn.innerText = "Run Inference Engine";
            }
        };
    </script>
</body>
</html>
