<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABBS Mothercare AI | Advanced Demand Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select, input { cursor: pointer; transition: 0.2s; }
        input:focus { outline: none; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-xl w-full glass-card rounded-[2.5rem] shadow-2xl p-6 md:p-10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="https://raw.githubusercontent.com/dleysam/mothercare_frontend/main/gabbs.png" alt="GABBS" class="h-10 object-contain">
            </div>
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent italic">Mothercare Predictor</h1>
            <p id="sync-status" class="text-blue-500 text-[10px] uppercase tracking-[0.2em] font-bold mt-2">📡 Weather Link Active</p>
        </div>

        <form id="predictForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Category</label>
                    <select id="category" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm font-bold appearance-none">
                        <option value="Mothercare">Mothercare</option>
                        <option value="Toys">Toys</option>
                        <option value="Back to School">Back to School</option>
                        <option value="Wears/Shoes">Wears/Shoes</option>
                        <option value="General/Other">General/Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Detected Weather</label>
                    <div id="weather_display" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-sm font-bold text-blue-400 capitalize">
                        Loading...
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[9px] text-slate-500 uppercase mb-1 ml-1">Day (1-31)</label>
                    <input type="number" id="day" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-center font-bold">
                </div>
                <div>
                    <label class="block text-[9px] text-slate-500 uppercase mb-1 ml-1">Month (1-12)</label>
                    <input type="number" id="month" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 text-center font-bold">
                </div>
                <div>
                    <label class="block text-[9px] text-blue-500 uppercase mb-1 ml-1">Hour (0-23)</label>
                    <input type="number" id="start_hour" class="w-full bg-blue-900/20 border border-blue-500/50 rounded-2xl p-4 text-center font-bold text-blue-400">
                </div>
            </div>

            <div class="p-6 bg-slate-900/50 rounded-[2rem] border border-slate-800 grid grid-cols-3 gap-4 text-center">
                <div><span class="text-[9px] text-slate-500 uppercase font-black">Temp</span><p id="t_val" class="text-xl font-black">--</p></div>
                <div class="border-x border-slate-800"><span class="text-[9px] text-slate-500 uppercase font-black">Humid</span><p id="h_val" class="text-xl font-black">--</p></div>
                <div><span class="text-[9px] text-slate-500 uppercase font-black">Precip</span><p id="p_val" class="text-xl font-black">--</p></div>
            </div>

            <input type="hidden" id="day_final" value="1">
            <input type="hidden" id="shelf_status" value="3">
            <input type="hidden" id="payday_bin" value="0">

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[2rem] shadow-xl uppercase tracking-[0.2em] text-xs transition-all active:scale-95">
                Run Inference Engine
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 p-8 bg-slate-900 rounded-[2.5rem] border border-slate-800 text-center animate-in fade-in zoom-in duration-300">
            <p id="statusLabel" class="text-[10px] font-bold uppercase tracking-widest mb-2"></p>
            <h2 id="predictionValue" class="text-7xl font-black text-white">0</h2>
            <p id="suggestionText" class="text-slate-400 text-[11px] mt-4 uppercase font-bold px-4"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://dleysam-mothercare-predictor-api.hf.space/predict";
        const WEATHER_KEY = "Q4G4KAQFFW5RMB9VCTFKZGXP9";

        let metrics = { temp: 28, humidity: 65, precip: 0, conditions: "clear" };

        async function updateWeather() {
            const d = document.getElementById('day').value;
            const m = document.getElementById('month').value;
            const h = document.getElementById('start_hour').value;
            const statusEl = document.getElementById('weather_display');
            
            try {
                const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/Warri,NG/2026-${m}-${d}?unitGroup=metric&key=${WEATHER_KEY}&contentType=json`);
                if (!res.ok) throw new Error("API Limit");
                
                const data = await res.json();
                const hrData = data.days[0].hours[h] || data.days[0];
                
                // Format condition to match model expectation (clear, rainy, cloudy, overcast)
                let cond = hrData.conditions.toLowerCase();
                if (cond.includes('rain')) cond = 'rainy';
                else if (cond.includes('cloud')) cond = 'cloudy';
                else if (cond.includes('overcast')) cond = 'overcast';
                else cond = 'clear';

                metrics = { 
                    temp: hrData.temp, 
                    humidity: hrData.humidity, 
                    precip: hrData.precip || 0,
                    conditions: cond
                };

                document.getElementById('t_val').innerText = metrics.temp + "°";
                document.getElementById('h_val').innerText = Math.round(metrics.humidity) + "%";
                document.getElementById('p_val').innerText = metrics.precip + "mm";
                statusEl.innerText = cond;

            } catch (e) { 
                statusEl.innerText = "Manual Mode";
                statusEl.classList.replace('text-blue-400', 'text-slate-500');
            }
        }

        // Auto-fill current date/time on load
        window.onload = () => {
            const now = new Date();
            document.getElementById('day').value = now.getDate();
            document.getElementById('month').value = now.getMonth() + 1;
            document.getElementById('start_hour').value = now.getHours();
            updateWeather();
        };

        // Re-fetch weather if inputs change
        [document.getElementById('day'), document.getElementById('month'), document.getElementById('start_hour')].forEach(el => {
            el.addEventListener('change', updateWeather);
        });

        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Analyzing...';

            const payload = {
                category: document.getElementById('category').value,
                weather: metrics.conditions,
                day_final: parseInt(document.getElementById('day_final').value),
                day: parseInt(document.getElementById('day').value),
                month: parseInt(document.getElementById('month').value),
                payday_bin: parseInt(document.getElementById('payday_bin').value),
                start_hour: parseInt(document.getElementById('start_hour').value),
                shelf_status: parseInt(document.getElementById('shelf_status').value),
                temp: parseFloat(metrics.temp),
                humidity: parseInt(metrics.humidity),
                precip: parseFloat(metrics.precip)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Backend Offline");

                const data = await response.json();
                const prediction = parseFloat(data.prediction);
                const pRounded = Math.round(prediction);
                
                const resBox = document.getElementById('resultBox');
                const pVal = document.getElementById('predictionValue');
                const sLab = document.getElementById('statusLabel');
                const sTex = document.getElementById('suggestionText');

                resBox.classList.remove('hidden');
                pVal.innerText = prediction.toFixed(1);

                if (prediction <= 1.5) {
                    sLab.innerText = "Low Demand";
                    sLab.style.color = "#10b981";
                    sTex.innerText = "Good time for inventory checks and shelf tidying.";
                } else if (prediction <= 3.5) {
                    sLab.innerText = "Moderate Demand";
                    sLab.style.color = "#f59e0b";
                    sTex.innerText = "Expect steady customers. Keep sections organized.";
                } else {
                    sLab.innerText = "High Demand / Rush!";
                    sLab.style.color = "#ef4444";
                    sTex.innerText = "Peak period! Ensure all hands are on deck for quick service.";
                }
                
                resBox.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                alert("Connection Error: Please ensure your Hugging Face space is active.");
                console.error(err);
            } finally {
                btn.disabled = false; 
                btn.innerText = "Run Inference Engine";
            }
        };
    </script>
</body>
</html>
