<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABBS Mothercare AI | Precise Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select, input { transition: all 0.2s ease-in-out; }
        select:focus, input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-xl w-full glass-card rounded-[2rem] shadow-2xl p-6 md:p-10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="https://raw.githubusercontent.com/dleysam/mothercare_frontend/main/gabbs.png" alt="GABBS" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'" class="h-10 object-contain">
                <span id="logo-text" class="hidden text-2xl font-black tracking-tighter text-white">GABBS</span>
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Mothercare Predictor</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold mt-1">Advanced Demand Forecasting</p>
        </div>

        <form id="predictForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Category</label>
                    <select id="category" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none text-sm">
                        <option value="Wears/Shoes">Wears/Shoes</option>
                        <option value="Toys">Toys</option>
                        <option value="Back to School">Back to School</option>
                        <option value="Mothercare">Mothercare</option>
                        <option value="General/Other">General/Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Weather (Auto-synced)</label>
                    <select id="weather" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none text-sm">
                        <option value="0">Clear</option>
                        <option value="1">Clear/Sunny</option>
                        <option value="2">Cloudy</option>
                        <option value="3">Light Rain (Slow)</option>
                        <option value="4">Normal/Cool</option>
                        <option value="5">Overcast</option>
                        <option value="6">Rain</option>
                        <option value="8">Rainy</option>
                        <option value="9">Rainy/Cloudy</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase text-blue-500 mb-2 ml-1">Shelf Status (Current Stock)</label>
                <select id="shelf_status" class="w-full bg-slate-900/50 border border-blue-900/30 rounded-xl p-3 outline-none text-sm">
                    <option value="3">Normal (3)</option>
                    <option value="1">Overstocked (1)</option>
                    <option value="5">Empty (5)</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Day (Model Code)</label>
                    <select id="day_final" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm outline-none">
                        <option value="1">Monday</option>
                        <option value="5">Tuesday</option>
                        <option value="6">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="0">Friday</option>
                        <option value="2">Saturday</option>
                        <option value="3">Sunday</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Date (1-31)</label>
                    <input type="number" id="day" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Month (1-12)</label>
                    <input type="number" id="month" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Is Payday?</label>
                    <select id="payday_bin" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                        <option value="1">Yes (1)</option>
                        <option value="0">No (0)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Hour (0-23)</label>
                    <input type="number" id="start_hour" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                </div>
            </div>

            <details class="group">
                <summary class="text-[10px] font-bold uppercase text-slate-600 cursor-pointer hover:text-slate-400 transition ml-1">Environmental Data (Auto-filled)</summary>
                <div class="grid grid-cols-3 gap-3 mt-3 pt-3 border-t border-slate-800">
                    <div>
                        <label class="block text-[9px] text-slate-500 mb-1">Temp °C</label>
                        <input type="number" step="0.1" id="temp" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-center text-xs">
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-500 mb-1">Humidity %</label>
                        <input type="number" id="humidity" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-center text-xs">
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-500 mb-1">Precip mm</label>
                        <input type="number" step="0.1" id="precip" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-center text-xs">
                    </div>
                </div>
            </details>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg shadow-blue-900/20 transition-all">
                Run Inference
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 p-6 bg-slate-900 border border-slate-800 rounded-[1.5rem] text-center">
            <p id="statusLabel" class="text-[10px] font-bold uppercase tracking-widest mb-1"></p>
            <h2 id="predictionValue" class="text-6xl font-black text-white">0</h2>
            <p id="suggestionText" class="text-slate-300 text-xs mt-4 px-4 font-medium leading-relaxed"></p>
            <p class="text-slate-600 text-[9px] mt-6 italic border-t border-slate-800 pt-3">Smart Insights for GABBS Operations</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictForm');
        const API_URL = "https://dleysam-mothercare-predictor-api.hf.space/predict";
        const WEATHER_API_KEY = "Q4G4KAQFFW5RMB9VCTFKZGXP9";
        const CITY = "Warri,NG";

        window.onload = async () => {
            const now = new Date();
            const jsDay = now.getDay(); 
            const dayMap = { 0: 3, 1: 1, 2: 5, 3: 6, 4: 4, 5: 0, 6: 2 };

            document.getElementById('day_final').value = dayMap[jsDay];
            document.getElementById('day').value = now.getDate();
            document.getElementById('month').value = now.getMonth() + 1;
            document.getElementById('start_hour').value = now.getHours();

            await fetchAutoWeather();
        };

        async function fetchAutoWeather() {
            const day = document.getElementById('day').value.padStart(2, '0');
            const month = document.getElementById('month').value.padStart(2, '0');
            const year = new Date().getFullYear();
            const selectedDate = `${year}-${month}-${day}`;

            const weatherUrl = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${CITY}/${selectedDate}?unitGroup=metric&key=${WEATHER_API_KEY}&contentType=json`;

            try {
                const res = await fetch(weatherUrl);
                const data = await res.json();
                const forecast = data.days[0];

                document.getElementById('temp').value = forecast.temp;
                document.getElementById('humidity').value = forecast.humidity;
                document.getElementById('precip').value = forecast.precip || 0.0;

                const cond = forecast.conditions.toLowerCase();
                let code = 0; 

                if (cond.includes('partially cloudy')) code = 2;
                else if (cond.includes('overcast')) code = 5;
                else if (cond.includes('rain') && forecast.precip < 2) code = 3;
                else if (cond.includes('rain')) code = 8;
                else if (cond.includes('clear')) code = 0;
                
                document.getElementById('weather').value = code;
            } catch (e) {
                console.error("Weather auto-fill failed.");
            }
        }

        // Auto-update weather data if user changes the date
        document.getElementById('day').onchange = fetchAutoWeather;
        document.getElementById('month').onchange = fetchAutoWeather;

        function getFeedback(prediction) {
            if (prediction === 0) {
                return { val: "1", label: "Low Demand", color: "#10b981", action: "🟢 Quiet period. Perfect for restocking and organizing the mothercare floor." };
            } else if (prediction === 1) {
                return { val: "3", label: "Moderate Traffic", color: "#f59e0b", action: "🟡 Expect steady customers. Keep nursing mother assistants ready." };
            } else {
                return { val: "5", label: "High Demand / RUSH", color: "#ef4444", action: "🔴 Peak period! Speed up checkouts and clear the aisles." };
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resBox = document.getElementById('resultBox');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;
            
            const payload = {
                category: document.getElementById('category').value,
                weather: parseInt(document.getElementById('weather').value),
                day_final: parseInt(document.getElementById('day_final').value),
                day: parseInt(document.getElementById('day').value),
                month: parseInt(document.getElementById('month').value),
                payday_bin: parseInt(document.getElementById('payday_bin').value),
                start_hour: parseInt(document.getElementById('start_hour').value),
                shelf_status: parseInt(document.getElementById('shelf_status').value),
                temp: parseFloat(document.getElementById('temp').value),
                humidity: parseInt(document.getElementById('humidity').value),
                precip: parseFloat(document.getElementById('precip').value)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const feedback = getFeedback(data.prediction);
                
                resBox.classList.remove('hidden');
                document.getElementById('predictionValue').innerText = feedback.val;
                document.getElementById('statusLabel').innerText = feedback.label;
                document.getElementById('statusLabel').style.color = feedback.color;
                document.getElementById('suggestionText').innerText = feedback.action;
                resBox.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert("Hugging Face API Error. Check your Space status.");
            } finally {
                btn.innerHTML = 'Run Inference';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
