<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABBS Mothercare AI | Real-Time Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select, input { transition: all 0.2s ease-in-out; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-xl w-full glass-card rounded-[2rem] shadow-2xl p-6 md:p-10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="https://raw.githubusercontent.com/dleysam/mothercare_frontend/main/gabbs.png" alt="GABBS" class="h-10 object-contain">
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Mothercare Predictor</h1>
            <p id="sync-status" class="text-slate-500 text-[9px] uppercase tracking-widest font-bold mt-1">Live Weather: Warri, NG</p>
        </div>

        <form id="predictForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Category</label>
                    <select id="category" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none text-sm">
                        <option value="0">Back to School</option>
                        <option value="1">General/Other</option>
                        <option value="2">Mothercare</option>
                        <option value="3">Toys</option>
                        <option value="4">Wears/Shoes</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-blue-400 mb-2 ml-1">Weather (Hourly Sync)</label>
                    <select id="weather" class="w-full bg-slate-900/50 border border-blue-500/30 rounded-xl p-3 outline-none text-sm pointer-events-none">
                        <option value="0">Clear</option>
                        <option value="1">Clear/Sunny</option>
                        <option value="2">Cloudy</option>
                        <option value="3">Light Rain</option>
                        <option value="4">Normal/Cool</option>
                        <option value="5">Overcast</option>
                        <option value="8">Rainy</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Date</label>
                    <input type="number" id="day" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Month</label>
                    <input type="number" id="month" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-blue-400 mb-2">Hour (0-23)</label>
                    <input type="number" id="start_hour" class="w-full bg-blue-900/20 border border-blue-500/50 rounded-xl p-3 text-center text-sm font-bold">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Day of Week</label>
                    <select id="day_final" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm outline-none">
                        <option value="1">Monday</option>
                        <option value="5">Tuesday</option>
                        <option value="6">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="0">Friday</option>
                        <option value="2">Saturday</option>
                        <option value="3">Sunday</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Is Payday?</label>
                    <select id="payday_bin" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm">
                        <option value="0">No (0)</option>
                        <option value="1">Yes (1)</option>
                    </select>
                </div>
            </div>

            <div class="p-4 bg-slate-900/80 rounded-2xl border border-slate-800">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-3 tracking-widest">Atmospheric Data for selected Hour</p>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center">
                        <span class="block text-[10px] text-slate-500 mb-1">Temp</span>
                        <input type="text" id="temp" readonly class="w-full bg-transparent text-xl font-bold text-white text-center outline-none">
                    </div>
                    <div class="text-center border-x border-slate-800">
                        <span class="block text-[10px] text-slate-500 mb-1">Humidity</span>
                        <input type="text" id="humidity" readonly class="w-full bg-transparent text-xl font-bold text-white text-center outline-none">
                    </div>
                    <div class="text-center">
                        <span class="block text-[10px] text-slate-500 mb-1">Precip</span>
                        <input type="text" id="precip" readonly class="w-full bg-transparent text-xl font-bold text-white text-center outline-none">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                Run Prediction
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 p-6 bg-slate-900 border border-slate-800 rounded-[1.5rem] text-center">
            <p id="statusLabel" class="text-[10px] font-bold uppercase tracking-widest mb-1"></p>
            <h2 id="predictionValue" class="text-6xl font-black text-white">0</h2>
            <p id="suggestionText" class="text-slate-300 text-xs mt-4 px-4 font-medium leading-relaxed"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://dleysam-mothercare-predictor-api.hf.space/predict";
        const WEATHER_API_KEY = "Q4G4KAQFFW5RMB9VCTFKZGXP9";
        const CITY = "Warri,NG";

        // Global variables to store PURE numbers for the model
        let modelTemp = 28.5;
        let modelHumid = 65;
        let modelPrecip = 0.0;

        window.onload = () => {
            const now = new Date();
            document.getElementById('day').value = now.getDate();
            document.getElementById('month').value = now.getMonth() + 1;
            document.getElementById('start_hour').value = now.getHours();
            updateDayCode();
            fetchHourlyWeather();
        };

        function updateDayCode() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value) - 1;
            const y = new Date().getFullYear();
            const dateObj = new Date(y, m, d);
            const dayMap = { 0: 3, 1: 1, 2: 5, 3: 6, 4: 4, 5: 0, 6: 2 };
            document.getElementById('day_final').value = dayMap[dateObj.getDay()];
        }

        async function fetchHourlyWeather() {
            const d = document.getElementById('day').value.padStart(2, '0');
            const m = document.getElementById('month').value.padStart(2, '0');
            const h = parseInt(document.getElementById('start_hour').value);
            const y = new Date().getFullYear();
            const status = document.getElementById('sync-status');
            
            status.innerText = "🔄 Syncing Hourly Data...";
            const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${CITY}/${y}-${m}-${d}?unitGroup=metric&key=${WEATHER_API_KEY}&contentType=json`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const hourlyData = data.days[0].hours[h];

                // STORE PURE NUMBERS FOR THE MODEL
                modelTemp = hourlyData.temp;
                modelHumid = Math.round(hourlyData.humidity);
                modelPrecip = hourlyData.precip || 0;

                // DISPLAY WITH SYMBOLS FOR THE USER
                document.getElementById('temp').value = modelTemp + "°C";
                document.getElementById('humidity').value = modelHumid + "%";
                document.getElementById('precip').value = modelPrecip + "mm";

                const cond = hourlyData.conditions.toLowerCase();
                let code = 4; // Default to Normal
                if (cond.includes('partially cloudy')) code = 2;
                else if (cond.includes('overcast')) code = 5;
                else if (cond.includes('rain')) code = 8;
                else if (cond.includes('clear')) code = 1;
                
                document.getElementById('weather').value = code;
                status.innerText = `✅ Forecast for ${h}:00 synced`;
            } catch (e) { 
                status.innerText = "❌ Sync Failed";
            }
        }

        document.getElementById('day').addEventListener('input', () => { updateDayCode(); fetchHourlyWeather(); });
        document.getElementById('month').addEventListener('input', () => { updateDayCode(); fetchHourlyWeather(); });
        document.getElementById('start_hour').addEventListener('input', fetchHourlyWeather);

        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Analyzing...";

            // Payload only contains clean integers and floats
            const payload = {
                category: parseInt(document.getElementById('category').value),
                weather: parseInt(document.getElementById('weather').value),
                day_final: parseInt(document.getElementById('day_final').value),
                day: parseInt(document.getElementById('day').value),
                month: parseInt(document.getElementById('month').value),
                payday_bin: parseInt(document.getElementById('payday_bin').value),
                start_hour: parseInt(document.getElementById('start_hour').value),
                shelf_status: 3,
                temp: modelTemp,
                humidity: modelHumid,
                precip: modelPrecip
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const resBox = document.getElementById('resultBox');
                resBox.classList.remove('hidden');

                const p = Number(data.prediction);
                if (isNaN(p)) throw new Error("NaN Output");

                let label, color, action;
                if (p <= 1) {
                    label = "Low Demand"; color = "#10b981"; action = "🟢 Quiet Period. Good for inventory counts.";
                } else if (p <= 3) {
                    label = "Moderate Traffic"; color = "#f59e0b"; action = "🟡 Steady flow. Normal floor presence needed.";
                } else {
                    label = "High Demand / RUSH"; color = "#ef4444"; action = "🔴 Peak period! Prioritize checkout speed.";
                }

                document.getElementById('predictionValue').innerText = p;
                document.getElementById('statusLabel').innerText = label;
                document.getElementById('statusLabel').style.color = color;
                document.getElementById('suggestionText').innerText = action;
                resBox.scrollIntoView({ behavior: 'smooth' });
            } catch (err) { alert("API Error: Model failed to process."); }
            finally { btn.disabled = false; btn.innerText = "Run Prediction"; }
        };
    </script>
</body>
</html>
