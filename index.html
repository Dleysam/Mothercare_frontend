<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABBS Mothercare AI | Precise Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        select, input { transition: all 0.2s ease-in-out; }
        select:focus, input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-xl w-full glass-card rounded-[2rem] shadow-2xl p-6 md:p-10">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="gabbs.png" alt="GABBS" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'" class="h-10 object-contain">
                <span id="logo-text" class="hidden text-2xl font-black tracking-tighter text-white">GABBS</span>
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Mothercare Predictor</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] font-bold mt-1">Advanced Demand Forecasting</p>
        </div>

        <form id="predictForm" class="space-y-5">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Category</label>
                    <select id="category" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none">
                        <option value="Wears/Shoes">Wears/Shoes</option>
                        <option value="Toys">Toys</option>
                        <option value="Back to School">Back to School</option>
                        <option value="Mothercare">Mothercare</option>
                        <option value="General/Other">General/Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Weather</label>
                    <select id="weather" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 outline-none">
                        <option value="clear">Clear</option>
                        <option value="cloudy">Cloudy</option>
                        <option value="rainy">Rainy</option>
                        <option value="overcast">Overcast</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase text-blue-500 mb-2 ml-1">Shelf Status (Current Stock)</label>
                <select id="shelf_status" class="w-full bg-slate-900/50 border border-blue-900/30 rounded-xl p-3 outline-none">
                    <option value="3">Normal (3)</option>
                    <option value="1">Overstocked (1)</option>
                    <option value="5">Empty (5)</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Day (0-6)</label>
                    <input type="number" id="day_final" value="1" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Date (1-31)</label>
                    <input type="number" id="day" value="29" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2">Month (1-12)</label>
                    <input type="number" id="month" value="5" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-center">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Is Payday?</label>
                    <select id="payday_bin" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3">
                        <option value="1">Yes (1)</option>
                        <option value="0">No (0)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-slate-500 mb-2 ml-1">Hour (0-23)</label>
                    <input type="number" id="start_hour" value="10" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3">
                </div>
            </div>

            <details class="group">
                <summary class="text-[10px] font-bold uppercase text-slate-600 cursor-pointer hover:text-slate-400 transition ml-1">Environmental Data (Defaults)</summary>
                <div class="grid grid-cols-3 gap-3 mt-3 pt-3 border-t border-slate-800">
                    <div>
                        <label class="block text-[9px] text-slate-500 mb-1">Temp °C</label>
                        <input type="number" step="0.1" id="temp" value="28.5" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-center text-xs">
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-500 mb-1">Humidity %</label>
                        <input type="number" id="humidity" value="65" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-center text-xs">
                    </div>
                    <div>
                        <label class="block text-[9px] text-slate-500 mb-1">Precip mm</label>
                        <input type="number" step="0.1" id="precip" value="0.0" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-center text-xs">
                    </div>
                </div>
            </details>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg shadow-blue-900/20 transition-all">
                Run Inference
            </button>
        </form>

        <div id="resultBox" class="hidden animate-pulse mt-8 p-6 bg-blue-600/10 border border-blue-500/30 rounded-[1.5rem] text-center">
            <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Predicted Volume</p>
            <h2 id="predictionValue" class="text-6xl font-black text-white mt-1">0</h2>
            <p class="text-slate-500 text-[10px] mt-2 italic">Based on 11-feature analysis</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictForm');
        // UPDATE WITH YOUR HUGGING FACE URL
        const API_URL = "https://dleysam-mothercare-predictor-api.hf.space/predict";

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            const payload = {
                category: document.getElementById('category').value,
                weather: document.getElementById('weather').value,
                day_final: parseInt(document.getElementById('day_final').value),
                day: parseInt(document.getElementById('day').value),
                month: parseInt(document.getElementById('month').value),
                payday_bin: parseInt(document.getElementById('payday_bin').value),
                start_hour: parseInt(document.getElementById('start_hour').value),
                shelf_status: parseInt(document.getElementById('shelf_status').value), // 1, 3, or 5
                temp: parseFloat(document.getElementById('temp').value),
                humidity: parseInt(document.getElementById('humidity').value),
                precip: parseFloat(document.getElementById('precip').value)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const resBox = document.getElementById('resultBox');
                resBox.classList.remove('hidden', 'animate-pulse');
                document.getElementById('predictionValue').innerText = data.prediction;
                resBox.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert("Backend Offline: Check your Hugging Face space.");
            } finally {
                btn.innerHTML = 'Run Inference';
            }
        };
        // This function determines the description based on the number
function getFeedback(volume) {
    if (volume <= 1) {
        return {
            label: "Low Demand",
            color: "#10b981", // Green
            action: "Good time for inventory checks and shelf tidying."
        };
    } else if (volume <= 3) {
        return {
            label: "Moderate Demand",
            color: "#f59e0b", // Amber
            action: "Expect steady customers. Keep the nursing section organized."
        };
    } else {
        return {
            label: "High Demand / Rush!",
            color: "#ef4444", // Red
            action: "Peak period! Ensure all hands are on deck for quick service."
        };
    }
}

// Inside your .then(data => { ... }) block:
const feedback = getFeedback(data.prediction);
resultValue.innerText = data.prediction; // Keeps the number
statusLabel.innerText = feedback.label;   // Adds "Rush" or "Quiet"
statusLabel.style.color = feedback.color;
suggestionText.innerText = feedback.action; // Adds the "What to do"
    </script>
</body>
              </html>
